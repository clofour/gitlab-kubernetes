apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.name }}
spec:
  acme:
    server: {{ .Values.server }}
    email: {{ .Values.email }}
    privateKeySecretRef:
      name: {{ .Values.privateKeySecretName }}
    solvers:
      - http01:
          ingress:
            ingressClassName: {{ .Values.ingressClass }}